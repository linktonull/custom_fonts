name: Build and Package Font

on:
  # 你可以选择何时触发这个 workflow
  # 例如，手动触发：
  workflow_dispatch:

  # 或者在 push 到 main 分支时触发：
  # push:
  #   branches:
  #     - main

jobs:
  build_font:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 检出你的仓库代码

      - name: Install p7zip
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full # 安装 p7zip 工具

      - name: Extract OTD zip archive
        # 解压分卷压缩文件，只需指定第一个文件，p7zip 会自动处理后续分卷
        # 解压到当前目录
        # -y 选项表示对所有询问都回答 Yes (覆盖现有文件)
        run: 7z x otd.zip.001 -o. -y

      - name: Make build tools executable
        # 确保 merge-otd 和 otfccbuild 具有执行权限
        run: |
          tree
          chmod +x ./merge-otd
          chmod +x ./otfccbuild
          export PATH="$PWD/build:$PATH"
          ./merge-otd -n "my font;Regular;Normal;Normal" YsabeauInfant-Italic.otd LXGWWenKai-Regular.otd Tinos-Regular.otd NotoSansMath-Regular.otd SC.otd  TC.otd HK.otd JP.otd KR.otd blobemoji.otd TwemojiMozilla.otd NotoColorEmoji.otd

      - name: Build font files
        # 执行字体构建脚本
        # 假设 merge-otd 和 otfccbuild 在仓库的 build 目录下
        run: |
          ./otfccbuild YsabeauInfant-Italic.otd -O2 -o out.ttf
          ./otfccbuild YsabeauInfant-Italic.otd -O2 -o out.otf
        shell: bash # 明确指定使用 bash shell 执行脚本

      - name: Compress output files # <-- 修改了这个步骤
        run: |
          # 使用 tar.gz 进行最大压缩 (-9)
          # -c: 创建归档
          # -f: 指定归档文件名
          # --use-compress-program="gzip -9": 指定使用外部程序 "gzip -9" 进行压缩
          tar -cf out.ttf.tar.gz -C . out.ttf --use-compress-program="gzip -5"
          tar -cf out.otf.tar.gz -C . out.otf --use-compress-program="gzip -5"
          tar -cf YsabeauInfant-Italic.otd.tar.gz -C . YsabeauInfant-Italic.otd --use-compress-program="gzip -5"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4 # 使用上传 artifact 的 action
        with:
          name: built-fonts # artifact 的名称
          path: |
            ./YsabeauInfant-Italic.otd.tar.gz
            ./out.ttf.tar.gz
            ./out.otf.tar.gz
          retention-days: 1 # 可选：设置 artifact 的保留天数

